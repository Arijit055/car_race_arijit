<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Racing Ultimate ULTRA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: white; user-select: none; touch-action: none; width: 100vw; height: 100vh; }
  #start-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.88); backdrop-filter: blur(6px); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding: 40px 0; }
  .title-neon { color: #fff; font-size: 40px; font-style: italic; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff; margin-bottom: 5px; text-align: center; }
  .subtitle-neon { color: #00ffcc; font-size: 18px; letter-spacing: 3px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 0 8px #00ffcc; text-align: center; }
  .menu-stats { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #ffcc00; }
  .start-btn { background: #ff0055; color: white; font-size: 28px; font-weight: 900; letter-spacing: 2px; padding: 15px 50px; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px #ff0055; transition: 0.2s; text-transform: uppercase; margin-bottom: 30px; animation: pulse 1.5s infinite alternate; width: auto; }
  .start-btn:hover { background: #ff3377; box-shadow: 0 0 25px #ff3377; transform: scale(1.05); }
  @keyframes pulse { from { box-shadow: 0 0 10px #ff0055; } to { box-shadow: 0 0 25px #ff0055; } }
  .menu-grid { display: flex; gap: 20px; max-width: 800px; width: 90%; justify-content: center; flex-wrap: wrap; }
  .menu-panel { background: rgba(20,20,30,0.9); padding: 20px; border-radius: 12px; border: 1px solid #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.2); flex: 1; min-width: 250px; }
  .menu-panel h3 { margin-top: 0; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 18px; text-align: center; }
  .garage-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
  .garage-header h3 { border: none; padding: 0; margin: 0; flex-grow: 1; }
  .nav-arrow { background: transparent; border: none; color: #00ffcc; font-size: 24px; width: 40px; padding: 5px; cursor: pointer; transition: 0.2s; margin-top: 0; }
  .nav-arrow:hover { color: #fff; transform: scale(1.2); background: transparent; }
  button { width: 100%; margin-top: 8px; cursor: pointer; padding: 12px; border: none; border-radius: 6px; background: #333; color: white; font-weight: bold; transition: 0.2s; }
  button:hover:not(:disabled) { background: #555; }
  .buy-btn { background: #00887a; } .buy-btn:hover:not(:disabled) { background: #00b3a1; }
  .magnet-btn { background: #c0392b; } .magnet-btn:hover:not(:disabled) { background: #e74c3c; }
  .reset-btn { background: transparent; border: 1px solid #ff0033; color: #ff0033; margin-top: 30px; max-width: 200px; }
  .reset-btn:hover { background: #ff0033; color: white; box-shadow: 0 0 10px #ff0033; }
  #pause-btn { position: fixed; top: 20px; right: 20px; width: 55px; height: 55px; background: rgba(0,0,0,0.7); border: 2px solid #00ffcc; border-radius: 50%; color: #00ffcc; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 1000; display: none; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
  #pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .pause-card { background: #111; border: 2px solid #ff00ff; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(255,0,255,0.3); }
  .pause-opt { width: 200px; padding: 15px; margin: 10px; font-size: 18px; text-transform: uppercase; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
  .resume-btn { background: #00ffcc; color: #000; } .home-btn { background: #333; color: #fff; }
  body:not(.in-game) #ui,
  body:not(.in-game) #mobile-controls,
  body:not(.in-game) #reward-flash,
  body:not(.in-game) #pause-btn,
  body:not(.in-game) #sound-toggle-btn,
  body:not(.in-game) #damage-flash,
  body:not(.in-game) #nitro-vignette,
  body:not(.in-game) #speed-lines,
  body:not(.in-game) #fps-counter { display: none !important; }
  #ui { position: absolute; left: 10px; top: 10px; background: rgba(0,0,0,.82); padding: 15px; border-radius: 10px; width: 220px; z-index: 10; box-shadow: 0 0 10px rgba(255,0,255,0.2); border: 1px solid rgba(255,0,255,0.15); }
  #dist-ui { color: #ff00ff; font-size: 28px; font-weight: bold; margin-bottom: 2px; text-shadow: 0 0 5px #ff00ff; }
  #best-ui { font-size: 12px; color: #888; margin-bottom: 10px; }
  #coins-container { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  #speedometer-ui { color: #00ffcc; font-size: 24px; font-weight: 900; margin-bottom: 15px; font-style: italic; text-shadow: 0 0 10px rgba(0,255,204,0.6); }
  #speed-val { font-size: 32px; color: #fff; }
  .label { font-size: 14px; font-weight: bold; margin-top: 8px; margin-bottom: 3px; }
  .bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; width: 0%; box-shadow: 0 0 8px #00ffcc; transition: width 0.1s linear; }
  .stats-text { font-size: 11px; color: #00ffcc; margin-top: 15px; line-height: 1.5; }
  .stats-text span { display: block; }
  #mag-timer-ui { color: #ff3366; font-size: 16px; font-weight: bold; margin-top: 15px; display: none; text-shadow: 0 0 8px #ff3366; text-align: center; background: rgba(255,51,102,0.2); padding: 5px; border-radius: 5px; border: 1px solid #ff3366; }
  #inGameShieldBtn { width: 100%; margin-top: 15px; padding: 10px; border: none; border-radius: 6px; background: #4a90e2; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 0 8px rgba(74,144,226,0.5); }
  #inGameShieldBtn:disabled { background: #333; cursor: not-allowed; box-shadow: none; opacity: 0.6; }
  #inGameShieldBtn:active:not(:disabled) { transform: scale(0.95); }
  #fps-counter { position: fixed; bottom: 8px; right: 10px; font-size: 11px; color: #00ff88; font-family: monospace; z-index: 999; background: rgba(0,0,0,0.55); padding: 2px 7px; border-radius: 4px; pointer-events: none; }
  #sound-toggle-btn { position: fixed; top: 20px; right: 85px; width: 55px; height: 55px; background: rgba(0,0,0,0.7); border: 2px solid #ffcc00; border-radius: 50%; color: #ffcc00; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 1000; display: none; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,204,0,0.4); }
  #sound-panel { position: absolute; right: 10px; top: 90px; background: rgba(0,0,0,.92); padding: 14px; border-radius: 10px; width: 210px; z-index: 10; box-shadow: 0 0 12px rgba(255,204,0,0.3); display: none; border: 1px solid #ffcc00; }
  #sound-panel h4 { color: #ffcc00; font-size: 13px; margin: 0 0 10px 0; text-align: center; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .sound-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 11px; color: #aaa; }
  .sound-row label { width: 52px; flex-shrink: 0; }
  .sound-row input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #333; outline: none; cursor: pointer; }
  .sound-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ffcc00; cursor: pointer; box-shadow: 0 0 4px #ffcc00; }
  .sound-row input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #ffcc00; cursor: pointer; border: none; }
  .sound-val { width: 28px; text-align: right; color: #fff; font-size: 11px; }
  #damage-flash { position: fixed; inset: 0; background: rgba(255,0,0,0); pointer-events: none; z-index: 500; transition: background 0.1s; }
  #nitro-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 499; transition: background 0.15s; }
  #speed-lines { position: fixed; inset: 0; pointer-events: none; z-index: 498; overflow: hidden; }
  .speed-line { position: absolute; width: 2px; background: linear-gradient(to bottom, transparent, rgba(0,255,255,0.55), transparent); transform-origin: center top; animation: sline 0.25s linear infinite; opacity: 0; }
  @keyframes sline { from { opacity: 0; transform: scaleY(0); } 50% { opacity: 1; } to { opacity: 0; transform: scaleY(1); } }
  #near-miss-pop { position: absolute; top: 35%; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 28px; font-weight: 900; display: none; text-shadow: 0 0 15px #ffff00; z-index: 15; pointer-events: none; letter-spacing: 2px; }
  #gameover { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.92); padding: 30px; border-radius: 12px; display: none; font-size: 36px; text-align: center; z-index: 20; border: 2px solid red; box-shadow: 0 0 20px red; min-width: 280px; }
  #go-stats { font-size: 16px; color: #aaa; margin: 10px 0; line-height: 1.8; }
  #reward-flash { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #ff00ff; font-size: 40px; font-weight: bold; display: none; text-shadow: 0 0 15px #ff00ff; z-index: 15; pointer-events: none; }
  #mobile-controls { position: absolute; bottom: 20px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
  .control-group { pointer-events: auto; display: flex; gap: 10px; align-items: flex-end; }
  .touch-btn { background: rgba(0,0,0,0.5); border: 2px solid #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.4); color: white; font-size: 24px; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; user-select: none; margin-top: 0; }
  .touch-btn:active { background: rgba(0,255,204,0.4); }
  .nitro-btn { border-color: #ff6600; font-size: 28px; box-shadow: 0 0 10px rgba(255,102,0,0.4); }
  .nitro-btn:active { background: rgba(255,102,0,0.4); }
  @media (min-width: 800px) { #mobile-controls { display: none !important; } }
</style>
</head>
<body>

<div id="start-menu">
  <div class="title-neon">NEON RACING</div>
  <div class="subtitle-neon">ULTIMATE ULTRA - THE HYPERCAR UPDATE</div>
  <div class="menu-stats">🪙 <span id="menu-coins">0</span> &nbsp;|&nbsp; 🏆 Best: <span id="menu-best">0</span> m</div>
  <button class="start-btn" onclick="startGame()">START GAME</button>
  <div class="menu-grid">
    <div class="menu-panel">
      <h3>SHOP & UPGRADES</h3>
      <div id="upgrades"></div>
    </div>
    <div class="menu-panel">
      <div class="garage-header">
        <button class="nav-arrow" onclick="switchCategory(-1)">◀</button>
        <h3 id="garage-category-title">LAMBORGHINI</h3>
        <button class="nav-arrow" onclick="switchCategory(1)">▶</button>
      </div>
      <div id="cars"></div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetGame()">Reset Save Data</button>
</div>

<button id="sound-toggle-btn" onclick="toggleSoundPanel()">🔊</button>
<button id="pause-btn" onclick="togglePause()">II</button>

<div id="pause-menu">
  <div class="pause-card">
    <h2 style="color:#ff00ff;text-shadow:0 0 15px #ff00ff;margin-bottom:20px;">PAUSED</h2>
    <button class="pause-opt resume-btn" onclick="togglePause()">Resume</button>
    <button class="pause-opt home-btn" onclick="goHome()">Home</button>
  </div>
</div>

<div id="sound-panel">
  <h4>🔊 SOUND CONTROLS</h4>
  <div class="sound-row"><label>Music</label><input type="range" id="vol-music" min="0" max="100" value="10" oninput="updateVolume('music',this.value)"><span class="sound-val" id="val-music">10</span></div>
  <div class="sound-row"><label>Engine</label><input type="range" id="vol-engine" min="0" max="100" value="25" oninput="updateVolume('engine',this.value)"><span class="sound-val" id="val-engine">25</span></div>
  <div class="sound-row"><label>Nitro</label><input type="range" id="vol-nitro" min="0" max="100" value="70" oninput="updateVolume('nitro',this.value)"><span class="sound-val" id="val-nitro">70</span></div>
  <div class="sound-row"><label>Coins</label><input type="range" id="vol-coins" min="0" max="100" value="40" oninput="updateVolume('coins',this.value)"><span class="sound-val" id="val-coins">40</span></div>
  <div class="sound-row"><label>Damage</label><input type="range" id="vol-damage" min="0" max="100" value="80" oninput="updateVolume('damage',this.value)"><span class="sound-val" id="val-damage">80</span></div>
</div>

<div id="damage-flash"></div>
<div id="nitro-vignette"></div>
<div id="speed-lines"></div>
<div id="near-miss-pop">⚡ NEAR MISS +3🪙</div>
<div id="reward-flash">MILESTONE +15🪙</div>
<div id="fps-counter">60 FPS</div>

<div id="ui">
  <div id="dist-ui">0 m</div>
  <div id="best-ui">Best: 0 m</div>
  <div id="coins-container">🪙 <span id="coins">0</span></div>
  <div id="speedometer-ui"><span id="speed-val">0</span> <span style="font-size:14px">KM/H</span></div>
  <div class="label">Health</div>
  <div class="bar"><div id="healthBar" class="fill" style="width:100%;background:#00ff66"></div></div>
  <div class="label">Nitro</div>
  <div class="bar"><div id="nitroBar" class="fill" style="width:100%;background:#00ffcc"></div></div>
  <div class="stats-text">
    <span id="engineStats"></span>
    <span id="magnetStats"></span>
    <span id="shieldStatus"></span>
  </div>
  <button id="inGameShieldBtn" onclick="buyShield()">Buy Shield (100🪙)</button>
  <div id="mag-timer-ui">🧲 Magnet: <span id="magTime">0</span>s</div>
</div>

<div id="mobile-controls">
  <div class="control-group">
    <button id="btn-left" class="touch-btn">◀</button>
    <button id="btn-right" class="touch-btn">▶</button>
  </div>
  <div class="control-group">
    <button id="btn-brake" class="touch-btn" style="border-color:#ff0033;box-shadow:0 0 10px rgba(255,0,51,0.4)">▼</button>
    <button id="btn-accel" class="touch-btn">▲</button>
    <button id="btn-nitro" class="touch-btn nitro-btn">🔥</button>
  </div>
</div>

<div id="gameover">
  CRASHED 💥
  <div id="go-stats"></div>
  <button onclick="location.reload()" style="background:#ff0055;font-size:20px;padding:15px;margin-top:10px;width:auto">BACK TO MENU</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Save Data ──
let save = JSON.parse(localStorage.getItem("neonSaveLambos")) || {coins:0,unlocked:[0],selected:0,engineLevel:1,hasShield:false,highScore:0,magnetLevel:1};
if(!save.engineLevel) save.engineLevel=1;
if(!save.hasShield) save.hasShield=false;
if(!save.highScore) save.highScore=0;
if(!save.magnetLevel||save.magnetLevel<1) save.magnetLevel=1;
const saveGame = () => localStorage.setItem("neonSaveLambos", JSON.stringify(save));

// ── Car Models ──
const carModels = [
  {type:"lambo",color:0x00ffcc,name:"Cyan Lambo"},{type:"lambo",color:0xff0033,name:"Red Lambo"},
  {type:"lambo",color:0xffcc00,name:"Gold Lambo"},{type:"lambo",color:0x00ff00,name:"Neon Green Lambo"},
  {type:"lambo",color:0x9900ff,name:"Purple Lambo"},
  {type:"ferrari",color:0xdd0000,name:"Rosso Ferrari"},{type:"ferrari",color:0xffaa00,name:"Scuderia Ferrari"},
  {type:"ferrari",color:0x0066ff,name:"Electric Ferrari"},{type:"ferrari",color:0x39ff14,name:"Poison Ferrari"},
  {type:"ferrari",color:0xbf00ff,name:"Purple Ferrari"},{type:"ferrari",color:0xf0f0f0,name:"Silver Ferrari"},
  {type:"bugatti",color:0x0044ff,name:"Chiron Bugatti"},{type:"bugatti",color:0x111111,name:"Black Bugatti"},
  {type:"bugatti",color:0xffffff,name:"White Bugatti"},
  {type:"bmw",color:0xffffff,name:"Alpine White BMW"},{type:"bmw",color:0x0022ff,name:"San Marino BMW"},
  {type:"bmw",color:0x222222,name:"Stealth Black BMW"}
];
if(!carModels[save.selected]) save.selected=0;

const garageCategories=["lambo","ferrari","bugatti","bmw"];
const garageCategoryTitles=["LAMBORGHINI","FERRARI","BUGATTI","BMW"];
let currentCategoryIndex=0;
window.switchCategory=(dir)=>{currentCategoryIndex=(currentCategoryIndex+dir+4)%4; renderMenu();};

// ── Game State ──
let gameStarted=false, gameOver=false, isPaused=false, soundPanelOpen=false;
let coinScore=save.coins, distanceTraveled=0, lastMilestone=0, magnetTimeLeft=0;
let speed=0, steer=0, health=100, nitro=100;
const CAM_HEIGHT=7, CAM_DIST=12, CAM_LERP=0.08;

// ── FPS Tracking ──
let fpsFrames=0, fpsLast=performance.now();
let domFrame=0;
const DOM_THROTTLE=3;

// ── Speed lines ──
const slinesEl=document.getElementById('speed-lines');
for(let i=0;i<20;i++){
  const sl=document.createElement('div'); sl.className='speed-line';
  sl.style.left=Math.random()*100+'%'; sl.style.top=Math.random()*100+'%';
  sl.style.height=(Math.random()*120+60)+'px';
  sl.style.animationDelay=(Math.random()*0.25)+'s';
  slinesEl.appendChild(sl);
}
const slineEls=[...slinesEl.children];

// ── Audio ──
const engineSnd=new Audio("car_engine.mp3"); engineSnd.loop=true; engineSnd.volume=0.25;
const music=new Audio("car_back.mp3"); music.loop=true; music.volume=0.1;
const coinSnd=new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"); coinSnd.volume=0.4;
const playCoinSound=()=>{const c=coinSnd.cloneNode(); c.volume=coinSnd.volume; c.play().catch(()=>{});};
const magnetSnd=new Audio("car_magnet.mpeg"); magnetSnd.volume=0.8;
const nitroSnd=new Audio("https://assets.mixkit.co/active_storage/sfx/1654/1654-preview.mp3"); nitroSnd.volume=0.7; nitroSnd.loop=true;
const damageSnd=new Audio("car_damage.mpeg"); damageSnd.volume=0.8;
const gameOverSnd=new Audio("car_over.mpeg"); gameOverSnd.volume=1.0;
let audioStarted=false, isBoosting=false;

window.updateVolume=(type,val)=>{
  const v=parseInt(val)/100;
  document.getElementById('val-'+type).innerText=val;
  if(type==='music') music.volume=v;
  else if(type==='engine') engineSnd.volume=v;
  else if(type==='nitro') nitroSnd.volume=v;
  else if(type==='coins') coinSnd.volume=v;
  else if(type==='damage') damageSnd.volume=v;
};
window.toggleSoundPanel=()=>{soundPanelOpen=!soundPanelOpen; document.getElementById('sound-panel').style.display=soundPanelOpen?'block':'none';};

const damageFlashEl=document.getElementById('damage-flash');
function triggerDamageFlash(){
  damageFlashEl.style.background='rgba(255,0,0,0.45)';
  setTimeout(()=>{damageFlashEl.style.background='rgba(255,0,0,0)';},150);
}
function startAudio(){if(!audioStarted){music.play().catch(()=>{}); audioStarted=true;}}

function startGame(){
  document.getElementById('start-menu').style.display='none';
  document.body.classList.add('in-game');
  document.getElementById('pause-btn').style.display='flex';
  document.getElementById('sound-toggle-btn').style.display='flex';
  gameStarted=true; isPaused=false; startAudio(); updateShieldButtonUI();
}
window.togglePause=()=>{
  if(!gameStarted||gameOver) return;
  isPaused=!isPaused;
  document.getElementById('pause-menu').style.display=isPaused?'flex':'none';
  if(isPaused){music.pause(); engineSnd.pause(); nitroSnd.pause();}
  else if(audioStarted) music.play().catch(()=>{});
};
window.goHome=()=>location.reload();

// ── Three.js Scene ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);
scene.fog=new THREE.Fog(0x000010,60,350);

const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(600*3);
for(let i=0;i<600;i++){starPos[i*3]=Math.random()*200-100; starPos[i*3+1]=Math.random()*100+20; starPos[i*3+2]=Math.random()*-500;}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.8})));

const solidFloor=new THREE.Mesh(new THREE.PlaneGeometry(2000,4000),new THREE.MeshBasicMaterial({color:0x444444}));
solidFloor.rotation.x=-Math.PI/2; solidFloor.position.y=-0.1; scene.add(solidFloor);

const isMobile=/Mobi|Android/i.test(navigator.userAgent);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.5,600);
camera.position.set(0,CAM_HEIGHT,CAM_DIST);
const camTarget=new THREE.Vector3(0,CAM_HEIGHT,CAM_DIST);
const camLookTarget=new THREE.Vector3(0,1,-5);

const renderer=new THREE.WebGLRenderer({antialias:!isMobile,powerPreference:"high-performance"});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(isMobile?1:Math.min(devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));
const carLight=new THREE.PointLight(0x00ffff,1.5,30);
scene.add(carLight);

const road=new THREE.Mesh(new THREE.PlaneGeometry(20,4000),new THREE.MeshBasicMaterial({color:0x050505}));
road.rotation.x=-Math.PI/2; scene.add(road);

const railGeo=new THREE.BoxGeometry(0.2,0.5,10);
const railMat=new THREE.MeshBasicMaterial({color:0x00ffff});
const rails=[];
for(let i=0;i<40;i++){
  const r1=new THREE.Mesh(railGeo,railMat), r2=new THREE.Mesh(railGeo,railMat);
  r1.position.set(-10,0.25,-i*40); r2.position.set(10,0.25,-i*40);
  scene.add(r1,r2); rails.push(r1,r2);
}

function animate(){
  requestAnimationFrame(animate);
  if(document.hidden) return;
  if(!gameStarted||isPaused){renderer.render(scene,camera); return;}
  if(gameOver){renderer.render(scene,camera); return;}

  const d=Math.min(clock.getDelta(),0.05);

  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=500){
    document.getElementById('fps-counter').innerText=Math.round(fpsFrames*1000/(now-fpsLast))+' FPS';
    fpsFrames=0; fpsLast=now;
  }

  const maxSpeed=220+(save.engineLevel*30);
  const acceleration=140+(save.engineLevel*20);
  const magnetRange=10+(save.magnetLevel*8);
  const diffMult=1+Math.min(distanceTraveled/5000,2.0);

  const accel=(keys['KeyW']||keys['ArrowUp'])?1:(keys['KeyS']||keys['ArrowDown'])?-0.7:0;
  speed=clamp(speed+accel*acceleration*d,0,maxSpeed);

  const boosting=keys['Space']&&nitro>0;
  if(boosting){
    speed+=acceleration*d; nitro-=60*d; flame.visible=true;
    flame.scale.set(1,1+Math.random()*0.8,1);
    camera.fov=THREE.MathUtils.lerp(camera.fov,95,0.1);
    if(!isBoosting&&audioStarted){nitroSnd.play().catch(()=>{}); isBoosting=true;}
    document.getElementById('nitro-vignette').style.background='radial-gradient(ellipse at center,transparent 40%,rgba(0,255,204,0.18) 100%)';
  } else {
    nitro=clamp(nitro+30*d,0,100); flame.visible=false;
    camera.fov=THREE.MathUtils.lerp(camera.fov,70,0.1);
    if(isBoosting){nitroSnd.pause(); nitroSnd.currentTime=0; isBoosting=false;}
    document.getElementById('nitro-vignette').style.background='radial-gradient(ellipse at center,transparent 50%,rgba(0,255,204,0) 100%)';
  }
  camera.updateProjectionMatrix();

  const steeringInput=(keys['KeyA']||keys['ArrowLeft'])?-1:(keys['KeyD']||keys['ArrowRight'])?1:0;
  steer+=(steeringInput-steer)*0.1;
  if(!steeringInput) steer*=0.85;
  car.position.x=clamp(car.position.x+steer*speed*0.011,-8,8);
  car.rotation.z=steer*0.15; car.rotation.x=(speed/maxSpeed)*0.05;
  carLight.position.set(car.position.x,car.position.y+3,car.position.z-2);

  camTarget.x=THREE.MathUtils.lerp(camTarget.x,car.position.x*0.5,CAM_LERP);
  camTarget.y=THREE.MathUtils.lerp(camTarget.y,CAM_HEIGHT,CAM_LERP);
  camTarget.z=THREE.MathUtils.lerp(camTarget.z,car.position.z+CAM_DIST,CAM_LERP);
  camera.position.copy(camTarget);
  camLookTarget.x=THREE.MathUtils.lerp(camLookTarget.x,car.position.x,0.1);
  camLookTarget.y=1; camLookTarget.z=car.position.z-5; camera.lookAt(camLookTarget);

  distanceTraveled+=(speed*d)/10;

  const speedRatio=speed/maxSpeed;
  if(speedRatio>0.6){
    slinesEl.style.display='block';
    slineEls.forEach(sl=>{sl.style.opacity=((speedRatio-0.6)/0.4*(0.25+Math.random()*0.3)).toFixed(2);});
  } else { slinesEl.style.display='none'; }

  if(nearMissPopTimer>0){ nearMissPopTimer-=d; if(nearMissPopTimer<=0) document.getElementById('near-miss-pop').style.display='none'; }

  if(magnetTimeLeft>0){
    magnetTimeLeft-=d;
    if(domFrame%DOM_THROTTLE===0){ document.getElementById('mag-timer-ui').style.display='block'; document.getElementById('magTime').innerText=Math.ceil(magnetTimeLeft); }
  } else { magnetTimeLeft=Math.max(0,magnetTimeLeft); document.getElementById('mag-timer-ui').style.display='none'; }

  if(Math.floor(distanceTraveled/1000)>lastMilestone){
    lastMilestone=Math.floor(distanceTraveled/1000); coinScore+=15; save.coins=coinScore; saveGame(); updateShieldButtonUI();
    const flash=document.getElementById('reward-flash'); flash.style.display='block'; setTimeout(()=>flash.style.display='none',2000);
  }
  if(Math.floor(distanceTraveled)>save.highScore){save.highScore=Math.floor(distanceTraveled); saveGame();}

  domFrame++;
  if(domFrame%DOM_THROTTLE===0){
    document.getElementById('dist-ui').innerText=Math.floor(distanceTraveled)+" m";
    document.getElementById('best-ui').innerText=`Best: ${save.highScore} m`;
    document.getElementById('coins').innerText=coinScore;
    document.getElementById('speed-val').innerText=Math.floor(speed);
    document.getElementById('healthBar').style.width=health+"%";
    document.getElementById('healthBar').style.background=health>60?'#00ff66':health>30?'#ffaa00':'#ff2222';
    document.getElementById('nitroBar').style.width=nitro+"%";
    document.getElementById('nitroBar').style.background=boosting?'#ff6600':'#00ffcc';
  }

  if(shieldMesh&&save.hasShield){shieldMesh.rotation.y+=d*2; shieldMesh.rotation.z+=d;}

  if(audioStarted){
    engineSnd.playbackRate=0.6+speed/maxSpeed;
    if(speed>0.5&&!gameOver){if(engineSnd.paused) engineSnd.play().catch(()=>{});}
    else if(!engineSnd.paused) engineSnd.pause();
  }

  for(const l of lines){l.position.z+=speed*d*2; if(l.position.z>20) l.position.z-=1200;}
  for(const r of rails){r.position.z+=speed*d*2; if(r.position.z>20) r.position.z-=1600;}
  for(const b of buildings){
    b.position.z+=speed*d*2;
    if(b.position.z>50){b.position.z-=3200; const left=Math.random()>0.5; b.position.x=left?-(Math.random()*200+18):Math.random()*200+18;}
  }

  magnetPowerup.position.z+=speed*d*2; magnetPowerup.rotation.y+=d*3;
  if(magnetPowerup.position.z>20){magnetPowerup.position.z=-800-Math.random()*1000; magnetPowerup.position.x=Math.random()*14-7;}
  if(hitMagnet(car,magnetPowerup)){magnetTimeLeft=30; magnetPowerup.position.z=-1500; if(audioStarted){magnetSnd.currentTime=0; magnetSnd.play().catch(()=>{});}}

  for(const t of traffic){
    t.position.z+=speed*d*2*diffMult;
    if(t.position.z>20){t.position.z=-300-Math.random()*400; t.position.x=Math.random()*14-7;}
    if(hitTraffic(car,t)&&!t.userData.hit){
      t.userData.hit=true;
      if(save.hasShield){save.hasShield=false; saveGame(); document.getElementById('shieldStatus').innerText="Shield: BROKEN"; shieldMesh.visible=false; updateShieldButtonUI();}
      else{
        health=clamp(health-20,0,100); triggerDamageFlash();
        if(health<=0){
          gameOver=true; car.visible=false;
          document.getElementById('pause-btn').style.display='none';
          document.getElementById('sound-toggle-btn').style.display='none';
          document.getElementById('gameover').style.display='block';
          document.getElementById('go-stats').innerHTML=`Distance: <b>${Math.floor(distanceTraveled)} m</b><br>Coins: <b>${coinScore}</b><br>Top Speed: <b>${Math.floor(maxSpeed)} km/h</b>`;
          document.getElementById('healthBar').style.width="0%";
          if(audioStarted){engineSnd.pause(); music.pause(); nitroSnd.pause(); gameOverSnd.play().catch(()=>{});}
        } else { if(audioStarted){damageSnd.currentTime=0; damageSnd.play().catch(()=>{});} }
      }
      setTimeout(()=>t.userData.hit=false,500);
    }
    if(!t.userData.hit&&!t.userData.nearMissed&&nearMissCheck(car,t)&&!hitTraffic(car,t)){
      t.userData.nearMissed=true; coinScore+=3; save.coins=coinScore; saveGame(); updateShieldButtonUI(); showNearMiss();
      setTimeout(()=>t.userData.nearMissed=false,1200);
    }
  }

  for(const c of coinsArr){
    c.rotation.y+=3*d; c.position.z+=speed*d*2;
    if(magnetTimeLeft>0){
      const dx=car.position.x-c.position.x, dz=car.position.z-c.position.z, dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<magnetRange){c.position.x+=dx*8*d; c.position.z+=dz*8*d;}
    }
    if(c.position.z>20){c.position.z=-200-Math.random()*200; c.position.x=Math.random()*14-7; c.userData.collected=false;}
    if(hitCoin(car,c)&&!c.userData.collected){
      c.userData.collected=true; c.position.z=50;
      coinScore++; save.coins=coinScore; saveGame(); updateShieldButtonUI();
      if(audioStarted) playCoinSound();
    }
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
